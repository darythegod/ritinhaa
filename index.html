<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap');

  :root {
    --dark-red: #8B0000;
    --deep-red: #5a0000;
    --blood-red: #6e0000;
    --beige: #f5e6d3;
    --cream: #fdf0e0;
    --parchment: #e8d5b7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, #2a0000 0%, #0d0000 60%, #000 100%);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Dancing Script', cursive;
    position: relative;
  }
  .silhouette-bg {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .silhouette-bg svg {
    height: 100vh;
    width: auto;
    filter: blur(1px);
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 0;
  }

  .heart-float {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: floatUp 6s ease-in infinite;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) rotate(-10deg) scale(0.5); }
    10%  { opacity: 0.6; }
    80%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(15deg) scale(1.1); }
  }


  .title-block {
    text-align: center;
    opacity: 0;
    animation: slideDown 1.2s cubic-bezier(.22,1,.36,1) 0.3s forwards;
    margin-bottom: 10px;
  }

  .title-block .subtitle {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--parchment);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }

  .main-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(52px, 12vw, 110px);
    color: var(--beige);
    line-height: 1;
    text-shadow:
      0 0 40px rgba(139,0,0,0.8),
      0 0 80px rgba(139,0,0,0.4),
      2px 2px 0px rgba(90,0,0,0.5);
    animation: pulseGlow 3s ease-in-out infinite alternate;
  }
  
  
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Pinyon+Script&display=swap');

:root {
  --red:   #7a0000;
  --red2:  #a00000;
  --deep:  #1a0000;
  --beige: #f2dfc8;
  --cream: #faebd7;
  --pale:  #e8d0b0;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; min-height:100vh;
  background: radial-gradient(ellipse at 50% 0%, #3a0000 0%, #180000 45%, #050000 100%);
  overflow-x: hidden;
  font-family: 'Dancing Script', cursive;
  color: var(--beige);
}

#silhouette {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  animation: siloFade 3s ease 0.5s forwards;
}
@keyframes siloFade { to { opacity: 1; } }
#silhouette svg { height: 95vh; width: auto; filter: blur(0.5px); }

#particles { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }

.page {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 60px 20px 80px;
}

.reveal {
  opacity: 0;
  transform: translateY(35px);
  transition: opacity 0.9s cubic-bezier(.22,1,.36,1), transform 0.9s cubic-bezier(.22,1,.36,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }

.ornament {
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeSlide 1s ease 0.2s both;
}
.ornament-line { width:80px; height:1px; background:linear-gradient(90deg,transparent,var(--red2),transparent); }
.ornament span { font-size:14px; letter-spacing:5px; text-transform:uppercase; color:var(--pale); opacity:0.7; }

.big-title {
  font-family: 'Pinyon Script', cursive;
  font-size: clamp(68px, 15vw, 140px);
  color: var(--beige);
  text-align: center;
  line-height: 1;
  text-shadow: 0 0 30px rgba(160,0,0,.9), 0 0 80px rgba(120,0,0,.5), 0 0 160px rgba(80,0,0,.3);
  animation: titleGlow 3.5s ease-in-out infinite alternate, fadeSlide 1.2s ease 0.4s both;
}
@keyframes titleGlow {
  from { text-shadow: 0 0 25px rgba(160,0,0,.8), 0 0 60px rgba(120,0,0,.4); }
  to   { text-shadow: 0 0 55px rgba(200,0,0,1), 0 0 130px rgba(140,0,0,.7), 0 0 220px rgba(80,0,0,.3); }
}

.name {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(36px, 8vw, 70px);
  color: var(--cream);
  text-align: center;
  letter-spacing: 6px;
  margin-top: -6px;
  opacity: .92;
  text-shadow: 0 0 18px rgba(160,0,0,.5);
  animation: fadeSlide 1s ease 0.7s both;
}

.heart-center { margin: 22px 0 14px; animation: fadeSlide 1s ease 1s both; }
.heart-center svg {
  animation: heartbeat 1.6s ease-in-out infinite;
  filter: drop-shadow(0 0 14px rgba(160,0,0,.8));
}
@keyframes heartbeat {
  0%,100% { transform: scale(1) rotate(-4deg); }
  25%     { transform: scale(1.12) rotate(3deg); }
  50%     { transform: scale(1.05) rotate(-2deg); }
}

.aura-line {
  font-size: clamp(20px, 4.5vw, 34px);
  color: var(--pale);
  letter-spacing: 3px;
  text-align: center;
  opacity: .85;
  text-shadow: 0 0 12px rgba(160,0,0,.4);
  animation: fadeSlide 1s ease 1.3s both;
  margin-bottom: 24px;
}

.poem {
  text-align: center;
  max-width: 480px;
  animation: fadeSlide 1s ease 1.6s both;
  margin-bottom: 30px;
}
.poem p { font-size: clamp(17px,3.5vw,25px); color:var(--beige); line-height:2; opacity:.88; text-shadow:0 1px 6px rgba(0,0,0,.6); }

.cats-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 44px;
  animation: fadeSlide 1s ease 2s both;
  margin-bottom: 32px;
}
.cat-unit { display:flex; flex-direction:column; align-items:center; }
.cat-unit:nth-child(1) { animation: catFloat 3.2s ease-in-out infinite; }
.cat-unit:nth-child(3) { animation: catFloat 3.2s ease-in-out 0.6s infinite; }
@keyframes catFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

.tail { animation: tailWag 1s ease-in-out infinite alternate; transform-origin:0% 0%; }
@keyframes tailWag { from{transform:rotate(-28deg);} to{transform:rotate(28deg);} }

.paw-lick { animation: lick 2.2s ease-in-out infinite; transform-origin:50% 100%; }
@keyframes lick {
  0%,60%,100%{transform:translateY(0) rotate(0deg);}
  20%{transform:translateY(-9px) rotate(-22deg);}
  40%{transform:translateY(-5px) rotate(-12deg);}
}

.bottom { text-align:center; animation:fadeSlide 1s ease 2.4s both; }
.bottom span { font-size:clamp(18px,4vw,30px); color:var(--pale); letter-spacing:3px; text-shadow:0 0 16px rgba(160,0,0,.5); }

.wavy { width:clamp(180px,50vw,360px); margin:12px 0; animation:fadeSlide 1s ease 0.9s both; }

.h-rain { position:fixed; pointer-events:none; z-index:2; bottom:-60px; animation:rain linear infinite; }
@keyframes rain {
  0%  {transform:translateY(0) rotate(0deg) scale(0.5); opacity:0;}
  8%  {opacity:0.6;}
  90% {opacity:0.2;}
  100%{transform:translateY(-110vh) rotate(30deg) scale(1.1); opacity:0;}
}

@keyframes fadeSlide {
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

  @keyframes pulseGlow {
    from { text-shadow: 0 0 30px rgba(139,0,0,0.8), 0 0 60px rgba(139,0,0,0.3); }
    to   { text-shadow: 0 0 60px rgba(139,0,0,1), 0 0 120px rgba(139,0,0,0.6), 0 0 200px rgba(80,0,0,0.3); }
  }

  .name-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(38px, 9vw, 80px);
    color: var(--cream);
    text-align: center;
    letter-spacing: 4px;
    opacity: 0.9;
    text-shadow: 0 0 20px rgba(139,0,0,0.5);
  }

  
  .center-heart {
    opacity: 0;
    animation: slideUp 1s ease 1.2s forwards;
    margin: 20px 0;
  }

  .center-heart svg {
    animation: swingHeart 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(139,0,0,0.7));
  }

  @keyframes swingHeart {
    0%,100% { transform: rotate(-5deg) scale(1); }
    50%      { transform: rotate(5deg) scale(1.08); }
  }

  .cat-wrap:nth-child(2) { animation-delay: 0.4s; }
  .cat-wrap:nth-child(3) { animation-delay: 0.8s; }

  @keyframes catBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }


  .scatter-hearts {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

    #musica {
    position: fixed;
    width: 0;
    height: 0;
    opacity: 0;
    pointer-events: none;
  }
  
  .custom-bg {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    background-image: url('https://i.imgur.com/IYQRGKO.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    opacity: 0.08;
    filter: blur(1px);
    z-index: 0;
    pointer-events: none;
  }

  .scatter-h {
    position: absolute;
    opacity: 0;
    animation: scatterAppear 4s ease-in-out infinite;
  }

  @keyframes scatterAppear {
    0%   { opacity: 0; transform: scale(0.3) rotate(0deg); }
    30%  { opacity: 0.5; }
    60%  { opacity: 0.3; transform: scale(1) rotate(20deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(-10deg); }
  }

 
  .bottom-msg {
    opacity: 0;
    animation: fadeIn 1.5s ease 4s forwards;
    text-align: center;
    margin-top: 16px;
  }

  .bottom-msg span {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(20px, 5vw, 36px);
    color: var(--parchment);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(139,0,0,0.6);
  }

    .bottom-msg h1 {
    font-family: cursive;
    font-size: clamp(1px, 2vw, 16px);
    color: var(--parchment);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }


  .cat-tail {
    transform-origin: top center;
    animation: tailWag 1.2s ease-in-out infinite alternate;
  }

  @keyframes tailWag {
    from { transform: rotate(-30deg); }
    to   { transform: rotate(30deg); }
  }


  .cat-paw {
    transform-origin: bottom center;
    animation: lickPaw 2.5s ease-in-out infinite;
  }

  @keyframes lickPaw {
    0%,100% { transform: rotate(0deg) translateY(0); }
    20%     { transform: rotate(-20deg) translateY(-6px); }
    40%     { transform: rotate(-10deg) translateY(-3px); }
    60%     { transform: rotate(0deg) translateY(0); }
  }


  .deco-line {
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }

  .deco-line svg {
    width: clamp(200px, 50vw, 400px);
  }

  
</style>
</head>

<script>
  const heartContainer = document.getElementById('floatingHearts');
  const heartPaths = [
    "M15,28 C14,24 4,18 1,12 C-1,6 2,1 7,1 C10,1 13,4 15,7 C17,4 20,1 23,1 C28,1 31,6 29,12 C26,18 16,24 15,28Z",
    "M12,24 C11,20 2,14 0,9 C-2,4 1,0 6,0 C9,0 11,3 12,5 C13,3 15,0 18,0 C23,0 26,4 24,9 C22,14 13,20 12,24Z"
  ];

  function createFloatingHeart() {
    const div = document.createElement('div');
    div.className = 'heart-float';
    const x = Math.random() * 100;
    const delay = Math.random() * 4;
    const dur = 5 + Math.random() * 5;
    const size = 15 + Math.random() * 25;
    div.style.cssText = `left:${x}%;bottom:-40px;animation-delay:${delay}s;animation-duration:${dur}s;`;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 30 30');
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', heartPaths[Math.floor(Math.random()*heartPaths.length)]);
    path.setAttribute('stroke', '#f5e6d3');
    path.setAttribute('stroke-width', '1.8');
    path.setAttribute('fill', 'rgba(139,0,0,0.3)');
    svg.appendChild(path);
    div.appendChild(svg);
    heartContainer.appendChild(div);
    setTimeout(() => div.remove(), (dur + delay) * 1000);
  }

  setInterval(createFloatingHeart, 800);
  for(let i=0;i<5;i++) setTimeout(createFloatingHeart, i*300);

  const scatter = document.getElementById('scatterHearts');
  const positions = [
    [8,10],[85,15],[5,40],[90,35],[12,70],[88,65],[20,88],[80,80],[50,5],[45,92],[30,25],[65,20],[15,55],[82,50]
  ];
  positions.forEach(([x,y],i) => {
    const div = document.createElement('div');
    div.className = 'scatter-h';
    const delay = Math.random()*5;
    const dur = 3+Math.random()*4;
    const size = 12 + Math.random()*18;
    div.style.cssText = `left:${x}%;top:${y}%;animation-delay:${delay}s;animation-duration:${dur}s;`;
    div.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 30 28" fill="none">
      <path d="M15,26 C13,22 3,16 1,10 C-1,4 3,0 8,0 C11,0 13,3 15,6 C17,3 19,0 22,0 C27,0 31,4 29,10 C27,16 17,22 15,26Z"
            stroke="#8B0000" stroke-width="2" fill="rgba(139,0,0,0.15)"/>
    </svg>`;
    scatter.appendChild(div);
  });
</script>
